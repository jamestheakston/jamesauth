<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Auth | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fas fa-id-card-clip text-xl"></i>
            </div>
            <span class="text-xl font-bold text-slate-800 tracking-tight">James Auth</span>
        </div>
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 lg:py-12 flex-grow w-full flex items-center justify-center">
        
        <div class="max-w-md mx-auto w-full">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <div id="login-container">
                    <div class="text-center mb-8">
                        <h2 id="auth-title" class="text-3xl font-extrabold text-slate-900 mb-2">Welcome Back</h2>
                        <p id="auth-subtitle" class="text-sm text-slate-500">Sign in to your James Auth account</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
                            <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm">
                        </div>
                        
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Password</label>
                            <input type="password" id="password" placeholder="â¢â¢â¢â¢â¢â¢â¢â¢" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm">
                        </div>
                        
                        <button id="main-auth-btn" onclick="signIn()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98] flex items-center justify-center mt-2">
                            Sign In
                        </button>
                        
                        <div class="text-center pt-2">
                            <button id="toggle-auth" onclick="toggleAuthMode()" class="text-sm font-bold text-blue-600 hover:text-blue-700">
                                Don't have an account? Create one
                            </button>
                        </div>
                    </div>

                    <div class="mt-10 pt-8 border-t border-slate-100">
                        <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                            <i class="fas fa-circle-info mr-2"></i> What is James Auth?
                        </h4>
                        <p class="text-[13px] text-slate-600 leading-relaxed">
                            James Auth is one platform you can use to connect to all my apps. Manage your entire workspace with a single identity.
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 bg-slate-900 text-white px-6 py-3.5 rounded-2xl shadow-2xl transition-all duration-500 z-[100] flex items-center space-x-3">
        <div id="toast-icon" class="w-2 h-2 bg-blue-500 rounded-full"></div>
        <span id="toast-msg" class="text-sm font-medium"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://llpmvxxacpvmmgijbhzo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hyDJDaNMbeoeLsMO7d4tJg_x4eORosJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            icon.className = isError ? 'w-2 h-2 bg-red-500 rounded-full' : 'w-2 h-2 bg-blue-500 rounded-full';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 4000);
        }

        function toggleAuthMode() {
            const btn = document.getElementById('main-auth-btn');
            const toggle = document.getElementById('toggle-auth');
            const isSignUp = btn.innerText === "Sign In";
            if (isSignUp) {
                btn.innerText = "Create Account";
                btn.onclick = signUp;
                toggle.innerText = "Already have an account? Sign In";
            } else {
                btn.innerText = "Sign In";
                btn.onclick = signIn;
                toggle.innerText = "Don't have an account? Create one";
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) return showToast(error.message, true);
            showToast("Success! Check your email.");
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) return showToast(error.message, true);
            showToast("Signing in...");
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Check if user is already authenticated and redirect to dashboard
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
