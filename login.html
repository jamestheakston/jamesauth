<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Auth | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fas fa-id-card-clip text-xl"></i>
            </div>
            <span class="text-xl font-bold text-slate-800 tracking-tight">James Auth</span>
        </div>
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[100]">
        <div class="flex items-center w-full max-w-xs p-4 bg-white rounded-lg shadow-lg border border-gray-200" role="alert">
            <svg id="toast-icon" class="w-6 h-6 text-blue-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.122 17.645a7.185 7.185 0 0 1-2.656 2.495 7.06 7.06 0 0 1-3.52.853 6.617 6.617 0 0 1-3.306-.718 6.73 6.73 0 0 1-2.54-2.266c-2.672-4.57.287-8.846.887-9.668A4.448 4.448 0 0 0 8.07 6.31 4.49 4.49 0 0 0 7.997 4c1.284.965 6.43 3.258 5.525 10.631 1.496-1.136 2.7-3.046 2.846-6.216 1.43 1.061 3.985 5.462 1.754 9.23Z"/></svg>
            <div id="toast-msg" class="ms-2.5 text-sm text-gray-700 border-l border-gray-300 ps-3.5"></div>
            <button onclick="hideToast()" type="button" class="ms-auto flex items-center justify-center text-gray-600 hover:text-gray-900 bg-transparent border border-transparent hover:bg-gray-100 focus:ring-4 focus:ring-gray-200 font-medium leading-5 rounded text-sm h-8 w-8 focus:outline-none" aria-label="Close">
                <span class="sr-only">Close</span>
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
            </button>
        </div>
    </div>

    <main class="max-w-5xl mx-auto p-6 lg:py-12 flex-grow w-full flex items-center justify-center">
        
        <div class="max-w-md mx-auto w-full">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <div id="login-container">
                    <div class="text-center mb-8">
                        <h2 id="auth-title" class="text-3xl font-extrabold text-slate-900 mb-2">Welcome Back</h2>
                        <p id="auth-subtitle" class="text-sm text-slate-500">Sign in to your James Auth account</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
                            <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm">
                        </div>
                        
                        <div class="space-y-1.5">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Password</label>
                            <input type="password" id="password" placeholder="••••••••••" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all shadow-sm">
                        </div>
                        
                        <button id="main-auth-btn" onclick="signIn()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98] flex items-center justify-center mt-2">
                            Sign In
                        </button>
                        
                        <div class="text-center pt-2">
                            <button id="toggle-auth" onclick="toggleAuthMode()" class="text-sm font-bold text-blue-600 hover:text-blue-700">
                                Don't have an account? Create one
                            </button>
                        </div>
                    </div>

                    <div class="mt-10 pt-8 border-t border-slate-100">
                        <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                            <i class="fas fa-circle-info mr-2"></i> What is James Auth?
                        </h4>
                        <p class="text-[13px] text-slate-600 leading-relaxed">
                            James Auth is one platform you can use to connect to all my apps. Manage your entire workspace with a single identity.
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-[100]">
        <div class="flex items-center w-full max-w-xs p-4 bg-white rounded-lg shadow-lg border border-gray-200" role="alert">
            <svg id="toast-icon" class="w-6 h-6 text-blue-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.122 17.645a7.185 7.185 0 0 1-2.656 2.495 7.06 7.06 0 0 1-3.52.853 6.617 6.617 0 0 1-3.306-.718 6.73 6.73 0 0 1-2.54-2.266c-2.672-4.57.287-8.846.887-9.668A4.448 4.448 0 0 0 8.07 6.31 4.49 4.49 0 0 0 7.997 4c1.284.965 6.43 3.258 5.525 10.631 1.496-1.136 2.7-3.046 2.846-6.216 1.43 1.061 3.985 5.462 1.754 9.23Z"/></svg>
            <div id="toast-msg" class="ms-2.5 text-sm text-gray-700 border-l border-gray-300 ps-3.5"></div>
            <button onclick="hideToast()" type="button" class="ms-auto flex items-center justify-center text-gray-600 hover:text-gray-900 bg-transparent border border-transparent hover:bg-gray-100 focus:ring-4 focus:ring-gray-200 font-medium leading-5 rounded text-sm h-8 w-8 focus:outline-none" aria-label="Close">
                <span class="sr-only">Close</span>
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
            </button>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://llpmvxxacpvmmgijbhzo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hyDJDaNMbeoeLsMO7d4tJg_x4eORosJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgElement = document.getElementById('toast-msg');
            
            msgElement.innerText = msg;
            
            // Set icon and color based on type
            if (type === 'error') {
                icon.innerHTML = '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>';
                icon.className = 'w-6 h-6 text-red-600';
            } else if (type === 'warning') {
                icon.innerHTML = '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 4.88c-.866-1.5-3.032-1.5-3.898 0L2.697 15.126Z"/>';
                icon.className = 'w-6 h-6 text-yellow-600';
            } else {
                icon.innerHTML = '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.122 17.645a7.185 7.185 0 0 1-2.656 2.495 7.06 7.06 0 0 1-3.52.853 6.617 6.617 0 0 1-3.306-.718 6.73 6.73 0 0 1-2.54-2.266c-2.672-4.57.287-8.846.887-9.668A4.448 4.448 0 0 0 8.07 6.31 4.49 4.49 0 0 0 7.997 4c1.284.965 6.43 3.258 5.525 10.631 1.496-1.136 2.7-3.046 2.846-6.216 1.43 1.061 3.985 5.462 1.754 9.23Z"/>';
                icon.className = 'w-6 h-6 text-green-600';
            }
            
            // Show toast
            toast.classList.remove('hidden');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                hideToast();
            }, 5000);
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('hidden');
        }

        function toggleAuthMode() {
            const btn = document.getElementById('main-auth-btn');
            const toggle = document.getElementById('toggle-auth');
            const isSignUp = btn.innerText === "Sign In";
            if (isSignUp) {
                btn.innerText = "Create Account";
                btn.onclick = signUp;
                toggle.innerText = "Already have an account? Sign In";
            } else {
                btn.innerText = "Sign In";
                btn.onclick = signIn;
                toggle.innerText = "Don't have an account? Create one";
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) return showToast(error.message, true);
            showToast("Success! Check your email.");
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) return showToast(error.message, true);
            showToast("Signing in...");
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        
        // Check if user is already authenticated and redirect to dashboard
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
